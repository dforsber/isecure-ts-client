name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release-please:
    name: Prepare semantic release
    runs-on: ubuntu-latest
    env:
      RELEASE_PLEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
    steps:
      - name: Require release token
        if: ${{ env.RELEASE_PLEASE_TOKEN == '' }}
        run: |
          echo "::error::Configure RELEASE_PLEASE_TOKEN so Release Please releases can trigger the npm publish workflow."
          exit 1

      - name: Release Please
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ env.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
